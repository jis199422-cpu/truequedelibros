spring.application.name=truequedelibros

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/truequedelibros}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway — autoconfiguration disabled; see FlywayConfig.java
spring.flyway.enabled=false

# JWT — replace secret with a random base64-encoded 256-bit key in production
app.jwt.secret=${APP_JWT_SECRET:VGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIFRydWVxdWUgZGUgTGlicm9zITIwMjY=}
app.jwt.access-token-expiration-ms=28800000

# Refresh token
app.refresh-token.expiration-days=30

# Google OAuth2 — set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET env vars
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/auth/google/callback

# ZeptoMail — set ZEPTO_SEND_MAIL_TOKEN and ZEPTO_FROM_ADDRESS env vars
zepto.api-url=https://api.zeptomail.com/v1.1/email
zepto.send-mail-token=${ZEPTO_SEND_MAIL_TOKEN:your-token-here}
zepto.from-address=${ZEPTO_FROM_ADDRESS:noreply@truequedelibros.com}
zepto.from-name=Trueque de Libros

# App
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.frontend-url-www=${APP_FRONTEND_URL_WWW:}
app.email-verification.expiration-hours=24

# AWS S3 — set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY as env vars
aws.s3.bucket=${AWS_S3_BUCKET:trueque-libros-dev}
aws.s3.region=${AWS_REGION:us-east-1}

# OpenAI
openai.api-key=${OPENAI_API_KEY:}

# Book defaults
book.default-cover-image-url=${BOOK_DEFAULT_COVER_URL:https://trueque-de-libros-books-media.s3.us-east-1.amazonaws.com/default/book-cover.png}

# Cookies
app.secure-cookies=${APP_SECURE_COOKIES:false}

# Reverse proxy (trust X-Forwarded-* headers from Nginx)
server.forward-headers-strategy=framework
server.tomcat.max-http-header-size=16KB
